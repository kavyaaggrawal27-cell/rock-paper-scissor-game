<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper sessior</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

    <div class="same un">
        
        <h1 class="dr">game draw</h1>
        <button class="re-game">New Game</button>
    </div>

    


    <div class="lose not">
        
        <h1 class="l-h1">computer are the winner</h1>
        <button class="l-game">New Game</button>
    </div>
    <div class="winner hide">
        
        <h1 class="w-h1">you are the winner</h1>
        <button class="new-game">New Game</button>
    </div>


    <div class="top-bar">
        <p class="gap pap">kavya</p>
        <p class="gap">VS</p>
        <p class="gap">vineet</p>
    </div>

    <div class="main-box">
        <div class="left-side">
            <button data-choice="rock" class="rock box tap">rock</button>
            <button  data-choice="paper" class="paper box tap">paper</button>
            <button  data-choice="scissor" class="scissor box tap">scissor</button>
        </div>
        <div class="middle">

            <div class="total-win">

            <h1 class="y-total"> your winning :</h1>
            <h1 class="c-total">Conputer total :</h1>
            
           
            </div>
            <div class="vss">
            <div class="show1 box"></div>
            <h1 class="ver">VS</h1>
            <div class="show2 box"></div>
            </div>
        </div>
        <div class="right-side">
            <button data-choice="rock" class="c1 box"></button>
            <button data-choice="paper" class="c2 box"></button>
            <button data-choice="scissor" class="c3 box"></button>

        </div>
        
    </div>

    <script src="game.js"></script>
</body>
</html>
